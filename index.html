<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QTRIP — Plan the Ultimate Bachelor & Bachelorette Trip</title>
    <meta name="description" content="Plan unforgettable bachelor & bachelorette trips to Marrakech, Marbella, and the Algarve. AI-powered scheduling, group booking, and all-in-one quotes." />
    <meta name="keywords" content="bachelor party, bachelorette trip, group travel, Marrakech, Marbella, Algarve, Faro, trip planner" />
    <meta name="theme-color" content="#ec4899" />
    <meta name="author" content="QTRIP" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="QTRIP — Plan the Ultimate Celebration" />
    <meta property="og:description" content="Plan unforgettable bachelor & bachelorette trips to Marrakech, Marbella, and the Algarve. AI-powered scheduling and all-in-one quotes." />
    <meta property="og:url" content="https://qtrip.app" />
    <meta property="og:image" content="https://qtrip.app/og-image.svg" />
    <meta property="og:site_name" content="QTRIP" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QTRIP — Plan the Ultimate Celebration" />
    <meta name="twitter:description" content="Bachelor & bachelorette trip planner with AI scheduling and group booking." />
    <meta name="twitter:image" content="https://qtrip.app/og-image.svg" />

    <!-- Canonical + hreflang -->
    <link rel="canonical" href="https://qtrip.app/" />
    <link rel="alternate" hreflang="en" href="https://qtrip.app/" />
    <link rel="alternate" hreflang="fr" href="https://qtrip.app/" />
    <link rel="alternate" hreflang="x-default" href="https://qtrip.app/" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "QTRIP",
      "url": "https://qtrip.app",
      "logo": "https://qtrip.app/favicon.svg",
      "image": "https://qtrip.app/og-image.svg",
      "description": "Plan unforgettable bachelor & bachelorette trips to Marrakech, Marbella, and the Algarve. AI-powered scheduling, group booking, and all-in-one quotes.",
      "areaServed": [
        { "@type": "City", "name": "Marrakech", "addressCountry": "MA" },
        { "@type": "City", "name": "Marbella", "addressCountry": "ES" },
        { "@type": "City", "name": "Faro", "addressCountry": "PT" }
      ],
      "knowsLanguage": ["en", "fr"],
      "priceRange": "$$"
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does QTRIP work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Choose your destination (Marrakech, Marbella, or Algarve), pick activities, transport, and accommodation, then get an instant all-in-one quote for your group."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to pay upfront?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. QTRIP provides a free, no-obligation quote. You only pay once you confirm your trip."
          }
        },
        {
          "@type": "Question",
          "name": "What destinations are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "QTRIP currently offers bachelor and bachelorette trip planning for Marrakech (Morocco), Marbella (Spain), and the Algarve region in Faro (Portugal)."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[100] focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:text-pink-600 focus:shadow-lg">
      Skip to content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
